name: Deploy frontend (Vercel)

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "vercel.json"
      - "frontend/vercel.json"
      - ".github/workflows/deploy-frontend-vercel.yml"

jobs:
  deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Check Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=0
          check() {
            if [ -z "$2" ]; then
              echo "::error::$1 no está disponible para este repositorio."
              missing=1
            fi
          }
          check "VERCEL_TOKEN" "$VERCEL_TOKEN"
          check "VERCEL_ORG_ID" "$VERCEL_ORG_ID"
          check "VERCEL_PROJECT_ID" "$VERCEL_PROJECT_ID"
          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "Los secrets deben llamarse exactamente VERCEL_TOKEN, VERCEL_ORG_ID y VERCEL_PROJECT_ID."
            echo "Si los creaste en la organización: Organization → Settings → Secrets and variables → Actions"
            echo "→ abre cada secret → Repository access → incluye este repositorio (o 'All repositories')."
            echo "No uses Variables para el token; deben ser Secrets (candado)."
            echo "Instrucciones completas: docs/ci-cd/vercel.md"
            exit 1
          fi

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"
